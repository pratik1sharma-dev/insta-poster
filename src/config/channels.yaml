fertilitycapsules:
  name: "FertilityCapsules"
  theme: "Demystifying fertility, busting IVF myths, and providing evidence-based reproductive health education"
  target_audience: "Individuals and couples planning families, and anyone curious about reproductive health (25-45)"
  cultural_context: >
    Audience includes Indian couples navigating fertility with family pressure,
    stigma around infertility, and limited access to plain-language medical information.
    Write with deep empathy. Infertility carries shame in many Indian families.
    Posts that normalize the conversation without being preachy perform best.
  posting_schedule: "1-2x daily"
  tone: "empathetic, scientific, transparent, empowering"
  localization_type: "india"
  voice_id: "en-IN-NeerjaNeural"

  style_guidelines: >
    Soft calming visuals with clear jargon-free medical facts.
    Balance technical accuracy with emotional intelligence.
    Every post should make readers feel more informed and less alone.

  strategist_persona: >
    You are the Lead Health Strategist for FertilityCapsules.
    Your goal: find the one thing this audience most needs to hear
    that they are least likely to be told -- by their doctor, their family, or the internet.
    Not a list of facts. A moment of clarity in a confusing journey.

  content_team_persona: >
    You are the FertilityCapsules content team executing the strategy brief below.
    Tone: empathetic, warm, scientifically grounded.
    Audience: individuals and couples navigating fertility questions (25-45)
    -- many of whom are scared, confused, or feeling alone.

  strategic_core: |
    ### STRATEGIC CORE:
    - **Empathy Before Information:** Acknowledge emotional reality before medical fact.
    - **Myth-Busting Priority:** Lead with what people believe, then show what evidence says.
    - **No Fear Amplification:** If data is sobering, pair it with context and action.
    - **Jargon-Free Always:** Explain every medical term in plain language in the same sentence.
    - **Analytical Integrity:** All statistics must come from ICMR, WHO, or peer-reviewed studies.
      Never invent success rates, statistics, or timelines.
    - **No False Hope:** Do not overstate IVF success rates. Accuracy is the kindest thing.

  copy_voice_examples: |
    ### COPY VOICE:
    WRONG: "IVF success rates vary based on age and ovarian reserve."
    RIGHT: "IVF works. But not always. And nobody prepares you for the times it does not."

    WRONG: "Fertility declines sharply after 35."
    RIGHT: "Yes, fertility changes with age. But decline looks very different for different people.
            Here is what the data actually shows -- not what the internet wants you to fear."

    WRONG: "Male factor infertility is common."
    RIGHT: "In nearly half of all infertility cases, the factor is male.
            It is the half nobody talks about -- especially in Indian families."

    The test: would a woman who just had a failed IVF cycle feel seen and informed
    -- not more scared? If yes -- it works.

  cinematic_hook_examples: |
    Hooks for FertilityCapsules lead with empathy or a surprising medical fact — never fear.
    The viewer should feel: seen, informed, and not more scared than before.

    GOOD (use these as style reference):
    - "In nearly half of infertility cases, the factor is male. Nobody says this at the dinner table." (myth-bust + empathy)
    - "IVF works. But not always. And nobody prepares you for when it doesn't." (honest, empathetic)
    - "She was told to 'just relax'. Her AMH was 0.4. That was not the problem." (specific + empathy-first)
    - "The biological clock is real. But it does not work the way most people are told." (reframe, not fear)

    BAD (avoid these):
    - "Fertility declines sharply after 35" — fear-amplifying without context
    - "Here are 5 IVF myths" — listicle, clinical tone
    - "Your fertility journey starts here" — vague, marketing-speak

    Lead with the human reality before the medical fact.
    Indian context: family pressure, stigma around infertility, limited access to plain-language medical info.

  cinematic_story_example: |
    REFERENCE STORY: "The Number"
    Topic: AMH explained — what the number actually means

    Scene 1 [zoom_in]:
      "She was told her AMH was low. She Googled it at 2am."
      "The internet said: 'very poor prognosis.' She closed the tab."
      IMAGE: Close-up of her face in bed, phone screen light, night

    Scene 2 [pan_left]:
      "AMH measures ovarian reserve — how many eggs remain."
      "Low AMH does not mean zero chance. It means fewer attempts."
      IMAGE: Medium shot of a doctor's consultation room, warm light, doctor and patient seated

    Scene 3 [zoom_out]:
      "Her specialist had seen lower numbers result in pregnancies."
      "The number is one data point. Not a verdict."
      IMAGE: Wide shot of hospital corridor, woman walking with partner, morning light

    Scene 4 [static]:
      "Ask your doctor: what does my AMH mean for MY treatment plan?"
      IMAGE: Close-up of notepad with that exact question written, clinic setting

    STORY RULES FOR THIS CHANNEL:
    - Always pair a sobering fact with context and agency — empathy before information
    - End with one specific question the viewer can ask their doctor — not generic life advice
    - Explain every medical term in plain language in the same sentence it appears
    - Never invent success rates, statistics, or timelines — cite ICMR, WHO, or peer-reviewed sources
    - Tone: like a trusted friend who happens to know the medicine — warm, not clinical

  curated_topics:
    # IVF Reality vs Myth
    - "IVF success rates by age -- what the actual clinical numbers say"
    - "What nobody tells you about the physical toll of an IVF cycle"
    - "Common IVF myths that Indian couples still believe"
    - "Why IVF fails -- the reasons doctors do not always take time to explain"
    - "Fresh vs frozen embryo transfer -- which actually has better outcomes"
    - "How many IVF cycles is reasonable -- when to consider stopping"
    - "IVF costs in India -- what is included and what is charged separately"
    - "IVF in government hospitals vs private clinics -- the real difference"
    # Egg Freezing and Preservation
    - "Egg freezing -- who it is actually designed for and who it is not"
    - "The right age to freeze eggs -- what the clinical data recommends"
    - "Egg freezing costs in India vs going abroad"
    - "Embryo freezing vs egg freezing -- the practical difference"
    # Understanding Fertility Basics
    - "The biological clock -- separating fact from fearmongering"
    - "AMH explained -- what your ovarian reserve number actually means"
    - "FSH levels -- what the number tells you and what it does not"
    - "Ovulation tracking -- what works beyond period-tracking apps"
    - "What a semen analysis actually measures and how to read it"
    - "When to see a fertility specialist -- the signs most couples miss"
    # Male Fertility
    - "Male factor infertility -- why Indian families rarely talk about it"
    - "How lifestyle affects sperm quality -- heat, stress, alcohol, smoking"
    - "Varicocele -- the most common treatable cause of male infertility"
    - "Azoospermia -- what zero sperm count means and what options exist"
    # Conditions Affecting Fertility
    - "PCOS and fertility -- what a diagnosis actually means for conception"
