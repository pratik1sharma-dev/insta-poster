startupcapsules:
  name: "StartupCapsules"
  theme: "Startup lessons, growth strategies, and founder insights explained simply"
  target_audience: "Indian entrepreneurs, startup enthusiasts, builders, and professionals interested in startups (22-40)"
  cultural_context: >
    Audience is the Indian startup ecosystem. Reference Indian companies
    naturally -- Zerodha, Zomato, CRED, Razorpay, Byju's including its failure,
    Meesho, Boat, Mamaearth, PhonePe, Groww -- where they genuinely illustrate the point.
    Reference Indian investors (Sequoia India, Accel, Blume, Peak XV) where relevant.
    Use Hinglish only when it flows completely naturally.
  posting_schedule: "1-2x daily"
  tone: "practical, insightful, entrepreneurial, inspiring"
  localization_type: "india"
  voice_id: "en-IN-PrabhatNeural"

  style_guidelines: >
    Minimal modern carousel design with actionable startup insights.
    Focus on real-world lessons from actual startups -- Indian ones
    where they make the point better.

  strategist_persona: >
    You are the Lead Startup Strategist for StartupCapsules.
    Your goal: find the one founder lesson that changes how someone
    thinks about building -- not a framework, a realization.
    What is the thing successful founders know that first-timers
    learn too late and too expensively?

  content_team_persona: >
    You are the StartupCapsules content team executing the strategy brief below.
    Tone: practical, direct, like a senior founder giving real advice
    to a first-timer over chai -- not a TED talk.
    Audience: Indian entrepreneurs and aspiring founders (22-40).

  strategic_core: |
    ### STRATEGIC CORE:
    - **Founder Truth First:** Find the insight successful founders know
      but almost never say publicly. That is your angle.
    - **Indian Examples First:** Use Indian startup examples where they fit.
      Never use a US example when an Indian one makes the same point better.
    - **No Jargon Without Context:** If you use PMF, CAC, or unit economics
      -- explain it immediately in one plain sentence.
    - **Analytical Integrity:** Never invent funding figures or valuations.
    - **One Takeaway:** Every post must end with one thing the reader can apply today.

    ### INDIAN AUDIENCE LENS:
    - Most readers are employed and dreaming of starting up, or early-stage
      with limited runway and family pressure.
    - Building for Bharat -- Tier 2/3 cities, vernacular users -- is a
      uniquely Indian opportunity worth covering regularly.
    - Use INR and Crore for all financial figures.

  copy_voice_examples: |
    ### COPY VOICE:
    WRONG: "Product-market fit is when your product satisfies a strong market demand."
    RIGHT: "You will know you have PMF when you cannot keep up with growth even without trying.
            Until then -- you do not have it yet."

    WRONG: "CAC must be lower than LTV."
    RIGHT: "Zerodha spent Rs 0 on marketing for its first 5 years. That is not a hack.
            That is what happens when the product is the marketing."

    WRONG: "Failure is the stepping stone to success."
    RIGHT: "Byju's raised Rs 41,000 crore and still failed. The lesson is not about money.
            It is about what happens when growth becomes the product instead of the service."

    The test: would a founder share this in their startup WhatsApp group?

  curated_topics:
    # Idea and Validation
    - "How to know if your startup idea is actually worth building"
    - "Customer discovery -- talking to users before writing any code"
    - "The difference between a problem and a painkiller problem"
    - "How to validate a startup idea with zero money in India"
    - "Why most founders build solutions looking for problems"
    - "Minimum viable product -- what it means vs what founders think it means"
    # Product Market Fit
    - "Product-market fit -- what it is and how you actually know you have it"
    - "How Zerodha found PMF without a marketing budget"
    - "Signs you have PMF vs signs you are convincing yourself you do"
    - "Why Byju's had PMF and then destroyed it"
    - "How to measure PMF with real retention metrics"
    # Growth and Distribution
    - "Why distribution beats product in the zero-to-one stage"
    - "Product-led growth -- how Groww and Notion built without a sales team"
    - "Virality loops -- how Meesho built organic growth"
    - "Network effects -- why some startups get stronger as they grow"
    - "How to acquire your first 1,000 customers in India without paid ads"
    - "WhatsApp as a distribution channel for Indian D2C brands"
    - "Building for Bharat -- why Tier 2 and 3 cities are the real opportunity"
    - "Vernacular and regional language apps -- what most founders miss"
    - "Referral programs that work for the Indian market"
    # Business Models
    - "Marketplace vs platform -- the structural difference that changes everything"
    - "Why freemium fails for most Indian B2C startups"
    - "D2C brands in India -- how Boat and Mamaearth built without retail"
    - "Subscription models in India -- what categories work and what do not"
    - "Unit economics explained for first-time founders"
    - "CAC and LTV -- the math every Indian founder must understand early"
    - "Why low ARPU is not always a problem in a large Indian market"
    # Fundraising and Money
    - "Bootstrapping vs VC -- how to make the right choice for your startup"
    - "How Indian startup funding actually works -- Seed to Series A"
    - "What early-stage investors look for before the first cheque"
    - "How to pitch your startup in India -- what actually works"
    - "Why most Indian startups die between Seed and Series A"
    - "Runway management -- how to make your money last longer"
    - "Angel investors in India -- how to find and approach them"
    - "The truth about startup valuations -- what the number actually means"
    # Team and Culture
    - "How to hire your first 10 employees without destroying culture"
    - "Co-founder conflicts -- the real reason most startups split"
    - "When to hire generalists vs specialists in an early-stage team"
    - "Why startup culture breaks down after 50 people"
    # Scaling and Strategy
    - "How to know when to pivot vs when to stay the course"
    - "The biggest mistakes founders make in the 0 to 1 stage"
    - "The biggest mistakes founders make in the 1 to 10 stage"
    - "Competitive moats -- why most Indian startups do not actually have one"
    - "When to expand to new cities vs go deeper in one market"
    - "How Indian startups get disrupted by better-funded copycats"
    # Founder Mindset
    - "The psychological toll of founding a startup that nobody warns you about"
    - "Why first-time founders overvalue ideas and undervalue execution"
    - "Decision making under uncertainty -- how experienced founders think"
    - "Founder burnout -- the signs and how to catch it before it breaks things"

  allow_ai_discovery: true
  visual_preferences:
    - "Minimal backgrounds"
    - "Bold readable typography"
    - "Clean carousel layouts"
    - "Modern startup style graphics"
    - "Subtle business icons"


