psychecapsules:
  name: "MindCapsules"
  theme: "Understanding human psychology and how the mind works"
  target_audience: "Curious Indian thinkers, professionals, and people interested in psychology and behavior (20-40)"
  cultural_context: >
    Audience is primarily Indian. Use relatable Indian scenarios naturally
    -- exam pressure, family expectations, career guilt, workplace dynamics.
    Write like a smart friend explaining your own brain to you over chai.
    Never force Hinglish.
  posting_schedule: "1-2x daily"
  tone: "thought-provoking, insightful, educational"
  localization_type: "india"
  voice_id: "en-IN-NeerjaExpressiveNeural"

  style_guidelines: >
    Explain psychological ideas clearly with simple visuals and relatable examples.
    Every post should make the reader feel like they just understood something
    about themselves they never had words for before.

  strategist_persona: >
    You are the Lead Psychological Strategist for MindCapsules.
    Your goal: find the Human Stake in every psychology concept.
    Why does this bias matter to someone who just made a decision they regret?
    Not a definition. A moment of recognition.

  content_team_persona: >
    You are the MindCapsules content team executing the strategy brief below.
    Tone: thought-provoking, warm, like a friend who studied psychology
    explaining your own behavior to you.
    Audience: curious Indian professionals (20-40) who want to understand themselves better.

  strategic_core: |
    ### STRATEGIC CORE:
    - **The Realization Format:** Every post should deliver one moment where
      the reader thinks "wait -- that is exactly what I do."
      Start with the behavior, then name the psychology.
    - **No Textbook Definitions:** Never open with "X bias is defined as..."
      Open with a situation the reader has lived.
    - **Visceral Tension:** Find the angle that makes the reader slightly
      uncomfortable -- because it is true about them.
    - **Analytical Integrity:** Never invent study statistics.

    ### INDIAN AUDIENCE LENS (apply lightly):
    - Indian readers carry specific pressures -- family expectations,
      log kya kahenge, career guilt, exam trauma, pressure to not waste
      parental sacrifice. When these fit the topic naturally, lean in.
      Never name them explicitly -- make the scenario specific enough
      that the reader feels seen.

  copy_voice_examples: |
    ### COPY VOICE:
    WRONG: "Sunk cost fallacy is a cognitive bias where people continue investing
            in something due to past investments."
    RIGHT: "The more you invest in something, the harder your brain fights to keep
            you there. Even when leaving is the only logical move."

    WRONG: "Loss aversion affects human decision making."
    RIGHT: "Losing Rs 1,000 hurts twice as much as winning Rs 1,000 feels good.
            Your brain is wired this way. And it is costing you more than money."

    The test: does this make the reader think about a specific decision
    they made last week?

  cinematic_hook_examples: |
    Hooks for MindCapsules create a moment of recognition — the viewer sees their own behavior named.
    The viewer should think: "Wait, that is exactly what I do."

    GOOD (use these as style reference):
    - "The more you invest in a bad decision, the harder your brain fights to stay." (sunk cost, no jargon)
    - "Losing ₹1,000 hurts twice as much as winning ₹1,000 feels good. Your brain is wired this way." (loss aversion + number)
    - "You do not remember the event. You remember how it ended." (peak-end rule, specific)
    - "Your brain decided 0.3 seconds before you knew you were deciding." (surprising fact)

    BAD (avoid these):
    - "Confirmation bias is a cognitive bias where..." — textbook definition, wrong
    - "Did you know psychology affects decisions?" — too vague

    The hook names the BEHAVIOR before naming the bias. Never lead with the term.
    Indian workplace and family scenarios resonate most: exam pressure, family expectations, salary decisions.

  cinematic_story_example: |
    REFERENCE STORY: "The Sunk Cost"
    Topic: Sunk cost fallacy — why past investment traps future decisions

    Scene 1 [zoom_in]:
      "The more you invest in something, the harder it is to leave."
      "Anjali had been in the job for 3 years. Two of them were wrong."
      IMAGE: Close-up of her face at laptop, late evening, overhead office light, tired expression

    Scene 2 [pan_left]:
      "Leaving felt like admitting the last two years were wasted."
      "They were not. Staying was the waste."
      IMAGE: Medium shot of her desk, empty office around her, colleagues gone home

    Scene 3 [zoom_out]:
      "Sunk cost fallacy: past investment traps future decisions."
      "The brain treats sunk costs as debt — even when they are gone."
      IMAGE: Wide shot of office building exterior, one window lit, blue dusk

    Scene 4 [static]:
      "Ask yourself: if I started today, would I choose this?"
      IMAGE: Close-up of her phone with a blank notes app open

    STORY RULES FOR THIS CHANNEL:
    - Name the bias or concept in Scene 3 or 4 — not in the hook
    - End with one specific question or reflection the viewer can apply today
    - Use Indian names, Indian workplace or family settings, Indian scenarios
    - Include one specific number or study finding per story if available from VERIFIED DATA
    - Tone: warm and curious, not clinical — like a friend explaining your brain to you

  curated_topics:
    # Cognitive Biases -- one clear post each, no duplicates
    - "Confirmation bias -- why you only find what you are already looking for"
    - "Availability heuristic -- why recent events feel more likely than they are"
    - "Anchoring bias -- why the first number always has too much power"
    - "Survivorship bias -- why success stories are statistically misleading"
    - "Recency bias -- why last month feels like it defines everything"
    - "Dunning-Kruger effect -- why beginners are overconfident and experts doubt themselves"
    - "Halo effect -- why attractive or successful people seem smarter"
    - "Authority bias -- why we trust titles and credentials over logic"
    - "Bandwagon effect -- why popularity becomes its own proof of quality"
    - "Negativity bias -- why bad news sticks harder and longer than good"
    - "Status quo bias -- why we choose familiar over objectively better"
    - "Sunk cost fallacy -- why past investment traps future decisions"
    - "Scarcity principle -- why limited supply changes what we want"
    - "Optimism bias -- why we think bad things happen to other people"
    - "Hindsight bias -- why everything seems obvious after it happens"
    # Decision Making
    - "How your brain decides before your conscious mind catches up"
    - "Decision fatigue -- why your worst choices happen in the evening"
    - "Why people avoid discomfort even when discomfort is the solution"
    - "How emotions hijack logical decisions in the moment"
    - "Cognitive dissonance -- why we believe what reduces our guilt"
    - "The psychology of regret -- why inaction hurts more than failure"
    - "Why people resist change even when the alternative is obviously better"
    - "Overchoice -- why too many options leads to worse decisions"
    # Motivation and Behavior
    - "What dopamine actually does versus what most people think"
    - "Intrinsic vs extrinsic motivation -- why rewards often backfire"
    - "Why humans procrastinate -- the real psychological mechanism"
    - "Delayed gratification -- what the marshmallow study actually proved"
    - "How habits form and why they are so hard to break"
    - "Fear vs reward motivation -- which one actually sustains behavior"
    - "Impulse control -- the psychology behind why some people have more"
    # Social Psychology
    - "Social proof -- why we look to others when we are uncertain"
    - "Why humans seek validation even from people they do not respect"
    - "The psychology of trust -- what actually builds it"
    - "Why people follow leaders even when the leader is clearly wrong"
    - "The spotlight effect -- why you think people notice you more than they do"
    - "Conformity pressure -- how groups change individual judgment"
    # Happiness and Identity
    - "The psychology of happiness -- why we are so bad at predicting it"
    - "Why people seek meaning more than pleasure"
    - "How core beliefs form -- and why they are almost impossible to change"
    - "Mental resilience -- what psychological research actually says it is"
    - "The psychology of confidence -- what builds it versus what fakes it"
    - "Why uncertainty feels worse than a confirmed bad outcome"
    - "Emotional intelligence -- separating the science from the self-help"
    # Self-Perception
    - "The planning fallacy -- why every project takes longer than expected"
    - "Why we overestimate our own abilities in familiar situations"
    - "The psychology of goal setting -- why most goals fail before February"
    - "Human attention -- what research shows about focus and distraction"

  allow_ai_discovery: true
  visual_preferences:
    - "Minimal backgrounds"
    - "Clean typography"
    - "Psychology themed icons"
    - "Soft modern color palettes"
    - "Concept illustration elements"


