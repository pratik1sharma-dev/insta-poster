pagecapsules:
  name: "PageCapsules"
  theme: "Compressing world-class wisdom into high-impact visual blueprints."
  brand_mission: "Summarize complex book ideas into 3-5 high-impact, actionable lessons. Prioritize life-changing insights over generic summaries."
  target_audience: "Lifelong learners and high-performers (22-40) who have a long 'to-read' list but limited time. They value dense, utility-first content that they can implement immediately."
  posting_schedule: "1-2x daily"
  tone: "authoritative, dense, utility-first, inspiring"
  style_guidelines: "Clear and concise text overlays with minimal modern design. Focus on practical insights and memorable takeaways."

  curated_topics:
    # Self-improvement
    - "Atomic Habits by James Clear"
    - "Deep Work by Cal Newport"
    - "Mindset by Carol Dweck"
    - "The Power of Habit by Charles Duhigg"

    # Psychology
    - "Thinking, Fast and Slow by Daniel Kahneman"
    - "Influence by Robert Cialdini"
    - "Predictably Irrational by Dan Ariely"
    - "The Happiness Hypothesis by Jonathan Haidt"

    # Business & Money
    - "The Psychology of Money by Morgan Housel"
    - "Zero to One by Peter Thiel"
    - "The Lean Startup by Eric Ries"
    - "The Hard Thing About Hard Things by Ben Horowitz"

    # Productivity
    - "Getting Things Done by David Allen"
    - "Essentialism by Greg McKeown"
    - "Make Time by Jake Knapp and John Zeratsky"
    - "Indistractable by Nir Eyal"

  allow_ai_discovery: true

  visual_preferences:
    - "Minimal backgrounds"
    - "Bold readable typography"
    - "High contrast colors"
    - "Clean carousel layouts"
    - "Subtle references to book covers"


