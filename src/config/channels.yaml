fertilitycapsules:
  name: "FertilityCapsules"
  theme: "Bridging the gap between medical science and the emotional journey of fertility."
  brand_mission: "Provide a compassionate, science-first guide to reproductive health. Prioritize data accuracy and medical facts while maintaining an empathetic tone to support users through complex journeys."
  target_audience: "Individuals and couples (25-45) navigating fertility, IVF, or reproductive health challenges. They value radical transparency, clinical evidence, and emotional validation."
  posting_schedule: "1-2x daily"
  tone: "empathetic, clinical, transparent, steadfast"
  style_guidelines: "Use soft, calming visuals combined with clear, jargon-free medical facts. Balance technical accuracy with emotional intelligence."

  curated_topics:
    # IVF & Myths
    - "IVF is not a 100% guarantee: Understanding success rates"
    - "The physical toll of IVF: What nobody tells you"
    - "Common IVF myths vs reality"
    - "Egg freezing: Timing, costs, and realistic expectations"
    - "The emotional rollercoaster of fertility treatments"

    # General Fertility Education
    - "Understanding the biological clock: Facts vs fearmongering"
    - "Male fertility: The often ignored 50% of the equation"
    - "How stress actually impacts fertility (and how it doesn't)"
    - "PCOS and Endometriosis: Navigating the common hurdles"
    - "The role of nutrition and lifestyle in reproductive health"

    # Knowledge Building
    - "Tracking ovulation: Beyond the apps"
    - "When to see a fertility specialist"
    - "Decoding fertility tests: AMH, FSH, and Semen Analysis"
    - "Secondary infertility: The silent struggle"
    - "Environmental factors and reproductive health"

  allow_ai_discovery: true

  visual_preferences:
    - "Soft, calming color palettes (muted teals, sage, warm neutrals)"
    - "Clean, minimal typography"
    - "Scientific yet approachable diagrams"
    - "Empathetic lifestyle imagery"
    - "Clear 'Myth vs Fact' layouts"