pagecapsules:
  name: "PageCapsules"
  theme: "Compressing world-class wisdom into high-impact visual blueprints."
  brand_mission: "Summarize complex book ideas into 3-5 high-impact lessons. Prioritize life-changing insights over generic summaries. Every post should answer: 'How can I use this today?'"
  target_audience: "Lifelong learners and professionals (22-40) who want the wisdom of books without the 10-hour time commitment."
  posting_schedule: "1-2x daily"
  tone: "authoritative, dense, utility-first"
  style_guidelines: "Clear text overlays with minimal modern design. Focus on practical takeaways."

  curated_topics:
    - "How to build life-changing habits (Atomic Habits)"
    - "How to reclaim your focus in a distracted world (Deep Work)"
    - "The secret to a growth mindset (Mindset)"
    - "Why we do what we do (The Power of Habit)"
    - "How to make better decisions (Thinking, Fast and Slow)"
    - "The art of persuasion (Influence)"
    - "Why we make irrational choices (Predictably Irrational)"
    - "The path to lasting happiness (The Happiness Hypothesis)"
    - "Mastering your money psychology (The Psychology of Money)"
    - "How to build the future (Zero to One)"
    - "The lean way to start a business (The Lean Startup)"
    - "Managing through hard times (The Hard Thing About Hard Things)"
    - "The art of getting things done (GTD)"
    - "The disciplined pursuit of less (Essentialism)"
    - "How to own your time (Make Time)"
    - "How to become indistractable (Indistractable)"

  allow_ai_discovery: true

  visual_preferences:
    - "Minimal backgrounds"
    - "Bold readable typography"
    - "High contrast colors"
    - "Clean carousel layouts"
    - "Subtle references to book covers"


wealthcapsules:
  name: "Wealth Capsules"
  theme: "Breaking down the mechanics of wealth creation for the modern professional."
  brand_mission: "Demystifying complex financial concepts with real-world math. Focus on the long-term impact of small decisions. Every post should provide a clear 'Action Step' for building wealth."
  target_audience: "Ambitious 22-40 year olds who want clear, non-speculative data to guide their path to financial independence."
  cultural_context: "Focus exclusively on the Indian financial ecosystem. Use Indian financial instruments like EPF, PPF, NPS, Mutual Fund SIPs, and Indian Income Tax slabs. Use 'Lakh' and 'Crore' for large numbers instead of millions/billions. Do not use US-specific terms like 401(k) or Roth IRA."
  posting_schedule: "1-2x daily"
  tone: "clinical, objective, empowering"
  style_guidelines: "Minimal modern design with clear and actionable financial insights."

  curated_topics:
    - "How starting small today builds a fortune later (Compounding)"
    - "Where to put your money so you can sleep at night (Asset Allocation)"
    - "How inflation is quietly eating your savings"
    - "Why your house might not be the 'investment' you think it is"
    - "The 50/30/20 rule for perfect budgeting"
    - "How to build an emergency fund from scratch"
    - "Why index funds beat 90% of professional investors"
    - "The true cost of a new car over 5 years"
    - "How to earn your first $1,000 in passive income"
    - "The psychological trap of lifestyle creep"

  allow_ai_discovery: true

  visual_preferences:
    - "Minimal backgrounds"
    - "Bold readable typography"
    - "High contrast colors"
    - "Clean carousel layouts"
    - "Subtle finance icons"


mindcapsules:
  name: "MindCapsules"
  theme: "Unlocking the psychological blueprints that drive human behavior."
  brand_mission: "Explain the 'Why' behind human behavior. Connect abstract concepts to daily habits. If using a complex term (e.g. Zeigarnik Effect), explain it using a simple real-world example immediately."
  target_audience: "Curious 20-40 year olds looking to optimize their life. They value simplicity and practical tools over academic jargon."
  cultural_context: "Use examples and social scenarios relevant to modern Indian life (workplace, family dynamics, social expectations). Use analogies that resonate with the Indian urban and professional experience."
  posting_schedule: "1-2x daily"
  tone: "cerebral, empathetic, clarifying"
  style_guidelines: "Explain psychological ideas clearly with simple visuals and relatable examples."

  curated_topics:
    - "Why we only see what we already believe (Confirmation Bias)"
    - "Why first impressions stick so hard (The Halo Effect)"
    - "Why unfinished tasks haunt your brain (The Zeigarnik Effect)"
    - "Why you can't stop checking your phone (The Dopamine Loop)"
    - "Why we fear losing more than we love winning (Loss Aversion)"
    - "Why we follow the crowd even when they're wrong (Social Proof)"
    - "How to break a bad habit in 3 steps"
    - "Why you feel tired even after 8 hours of sleep"
    - "The secret to making better decisions under stress"
    - "Why we procrastinate on things we actually want to do"

  allow_ai_discovery: true

  visual_preferences:
    - "Minimal backgrounds"
    - "Clean typography"
    - "Psychology themed icons"
    - "Soft modern color palettes"
    - "Concept illustration elements"


startupcapsules:
  name: "StartupCapsules"
  theme: "Tactical playbooks and hard-earned lessons from the world's fastest-growing builders."
  brand_mission: "Provide a tactical 'Founder’s Playbook' for the Indian ecosystem. Focus on scalability, unit economics, and real lessons from both failed and successful startups. Be honest about the 'ugly truth' of building."
  target_audience: "Founders, builders, and aspiring entrepreneurs (22-40) in India. They want practical frameworks and real-world metrics from the Indian market."
  cultural_context: "Use examples and analogies relevant to the Indian startup ecosystem. Reference local companies (e.g., Flipkart, Zomato, Zerodha), investors, and market trends. Use Hinglish phrases occasionally if it feels natural."
  posting_schedule: "1-2x daily"
  tone: "tactical, gritty, high-velocity"
  style_guidelines: "Minimal modern carousel design with clear and actionable startup insights. Focus on real-world strategies."

  curated_topics:
    - "How to find your first 100 customers"
    - "Why most startups fail in the first 12 months"
    - "The simple math of Unit Economics (LTV vs CAC)"
    - "How to build an MVP that actually validates your idea"
    - "Why 'Bootstrapping' is the ultimate superpower in 2025"
    - "The growth hacking secret of India's biggest unicorns"
    - "How to pitch your startup to an angel investor"
    - "Why your startup culture matters more than your code"
    - "The true cost of raising venture capital"
    - "How to pivot your product when growth stalls"

  allow_ai_discovery: true

  visual_preferences:
    - "Minimal backgrounds"
    - "Bold readable typography"
    - "Clean carousel layouts"
    - "Modern startup style graphics"
    - "Subtle business icons"


worldinranks:
  name: "WorldInRanks"
  theme: "Visualizing the hidden hierarchies and shifting global power dynamics."
  brand_mission: "Provide clear, data-driven rankings. Focus on 'surprising winners' and 'hidden leaders'. Use relatable comparisons to make huge numbers easy to understand."
  target_audience: "Curious professionals and trend-spotters (18-40) who want to see how the world is actually changing through data-backed comparisons."
  cultural_context: "Ensure global rankings are relevant to an Indian audience. Where possible, highlight India's position or impact. Use Indian Rupees (INR) alongside USD for major figures. Use analogies relatable to the Indian subcontinent."
  posting_schedule: "1-2x daily"
  tone: "analytical, neutral, scale-focused"
  style_guidelines: "Clean carousel slides presenting rankings and comparisons with minimal design and bold numbers."

  curated_topics:
    - "Who really owns the world? (Top 5 Investment Firms)"
    - "Where people earn the most (Top 5 Nations by Income)"
    - "The fastest growing economies in 2025"
    - "The most valuable tech companies in history"
    - "The most downloaded apps of all time"
    - "The largest cities by population in 2025"
    - "The world's most profitable companies"
    - "Which countries have the highest life expectancy?"
    - "The top 5 most valuable luxury brands"
    - "The biggest tech acquisitions ever made"

  allow_ai_discovery: true

  visual_preferences:
    - "Minimal backgrounds"
    - "Bold numbers and rankings"
    - "Clean carousel layouts"
    - "Simple icons and country flags"
    - "Clear data hierarchy"


fertilitycapsules:
  name: "FertilityCapsules"
  theme: "Bridging the gap between medical science and the emotional journey of fertility."
  brand_mission: "Provide a compassionate, science-first guide to reproductive health. Prioritize radical transparency and medical facts while maintaining a steadfast, empathetic tone."
  target_audience: "Individuals and couples (25-45) navigating fertility or IVF. They value clinical evidence and emotional validation over surface-level advice."
  posting_schedule: "1-2x daily"
  tone: "empathetic, clinical, transparent"
  style_guidelines: "Use soft, calming visuals with clear, jargon-free medical facts. Balance accuracy with emotional intelligence."

  curated_topics:
    - "IVF Success Rates: What the numbers actually mean"
    - "The physical toll of IVF (What nobody tells you)"
    - "5 common IVF myths vs the medical reality"
    - "Is egg freezing right for you? Timing and expectations"
    - "The emotional rollercoaster of fertility treatments"
    - "Understanding your biological clock: Facts vs Fear"
    - "Male fertility: The ignored 50% of the equation"
    - "Does stress actually impact fertility? (The Science)"
    - "Navigating PCOS and Endometriosis hurdles"
    - "How nutrition really impacts reproductive health"

  allow_ai_discovery: true

  visual_preferences:
    - "Soft, calming color palettes (muted teals, sage, warm neutrals)"
    - "Clean, minimal typography"
    - "Scientific yet approachable diagrams"
    - "Empathetic lifestyle imagery"
    - "Clear 'Myth vs Fact' layouts"