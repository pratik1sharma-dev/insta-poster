storycapsules:
  name: "StoryCapsules"
  theme: "Slice-of-life stories of a modern Indian woman navigating career, relationships, and self-discovery"
  target_audience: "Indian women (22-35) navigating ambition, relationships, identity, and modern life"
  cultural_context: >
    Stories are set in modern urban India. The protagonist is a young Indian woman
    navigating real situations — workplace pressure, family expectations, self-doubt,
    ambition, friendships, and relationships. Write with warmth and honesty.
    Never preachy. Show, don't tell.
  posting_schedule: "1x daily"
  tone: "warm, honest, relatable, cinematic"
  localization_type: "india"
  voice_id: "en-IN-NeerjaExpressiveNeural"

  # ── Publishing — posts to pagecapsules Instagram account ─────────────
  instagram_account: "pagecapsules"

  # ── Character (LoRA-based consistent protagonist) ──────────────────────
  character_lora: "Indian-v2:0.8"
  character_description: "young Indian woman, dark hair, brown eyes, natural skin tone"
  character_trigger_words: "Indian woman, realistic, authentic face, natural skin tone"

  style_guidelines: >
    Every reel is a short cinematic story featuring the same protagonist.
    Images show her in different real-life situations — not metaphors, not symbols.
    Actual moments: sitting in a cafe, walking to work, on a phone call, cooking.
    The story is told through her actions and environment.

  strategist_persona: >
    You are the Lead Story Architect for StoryCapsules.
    Your goal: find the one universal truth about modern Indian womanhood
    that most people feel but nobody names clearly.
    Tell it through the story of one woman in one specific situation.
    Not an essay — a moment.

  content_team_persona: >
    You are the StoryCapsules content team executing the strategy brief below.
    Tone: warm, cinematic, honest — like a short film with subtitles.
    The protagonist is always the same young Indian woman.
    Show her world. Let the viewer recognize themselves in her.

  strategic_core: |
    ### STRATEGIC CORE:
    - **One Protagonist:** Every reel features the same character in a new situation.
      She is not named — the viewer becomes her.
    - **Specific Moments:** Avoid vague emotions. Show the exact moment:
      the message she almost sent, the meeting she stayed quiet in, the mirror at 2am.
    - **No Moralizing:** Never tell the viewer what to feel or do.
      Let the scene speak. End with a question or an action, not a lesson.
    - **Continuity of Character:** The images always show the same woman.
      Different outfits, locations, expressions — same face, same soul.

  copy_voice_examples: |
    ### COPY VOICE:
    WRONG: "Women face many challenges in today's world."
    RIGHT: "She was the only woman in the room. She smiled. She took notes. She didn't say the thing she'd prepared."

    WRONG: "It's okay to prioritize yourself."
    RIGHT: "She cancelled the plan. Made chai. Sat with the silence. That was the whole day. That was enough."

    The test: does this feel like a scene from a short film someone made about a woman they know?

  cinematic_hook_examples: |
    Hooks for StoryCapsules must be a specific, relatable moment — not a stat or abstract idea.
    The viewer should think: "That is exactly what I do" or "That happened to me."

    GOOD (use these as style reference):
    3rd person — observational, viewer watches and recognizes:
    - "She had the answer. She didn't say it."
    - "The promotion came. Nobody at home knew what to say."
    - "She rehearsed the conversation for three years. She never had it."

    2nd person — direct, viewer IS the moment:
    - "You've been making yourself smaller to fit the room."
    - "You stayed two years longer than you should have. You know why."

    1st person — confessional, raw inner voice:
    - "I cancelled the plan. Made chai. Sat with the silence. That was enough."
    - "I had the answer. I didn't say it. I drove home."

    BAD (avoid these):
    - "67% of women feel undervalued at work" — stat, wrong for this channel
    - "What if ambition is holding you back?" — abstract question
    - "Society doesn't support ambitious women" — preachy, no specificity

    Scoring priority: RECOGNITION (does the viewer see themselves?) over curiosity gap.
    No percentages, statistics, or research data.

  cinematic_story_example: |
    REFERENCE STORIES — showing all three POV styles. Pick the POV that best fits the topic.

    ── 3RD PERSON (observational — viewer watches, recognizes) ──
    Best for: workplace moments, relationship dynamics, quiet external actions
    "The Meeting" — She had the right answer and said nothing

    Scene 1 [zoom_in]:
      "She had the answer. She didn't say it."
      "Her hand stayed under the table the whole meeting."
      IMAGE: Close-up of her face in a conference room, others blurred, soft office light

    Scene 2 [pan_left]:
      "Afterwards, he said it. Everyone nodded."
      "She smiled. She took notes. She drove home."
      IMAGE: Medium shot at her desk, end of day, golden light

    Scene 3 [zoom_out]:
      "That night she wrote: next time I'll say it."
      IMAGE: Close-up of her hand writing in a notebook, warm lamp light

    ── 2ND PERSON (direct — viewer IS the protagonist) ──
    Best for: universal truths, inner doubt, confronting a hard pattern
    "The Room" — Making yourself smaller

    Scene 1 [zoom_in]:
      "You've been making yourself smaller to fit the room."
      "The idea was yours. You let someone else say it."
      IMAGE: Wide shot of a meeting room, her at the edge of the table

    Scene 2 [pan_left]:
      "You told yourself: next time. You always say next time."
      IMAGE: Close-up of her hands, pen tapping on a notebook

    Scene 3 [static]:
      "You already know what you want to say. Say it."
      IMAGE: Close-up of her face, direct, quiet resolve, warm light

    ── 1ST PERSON (confessional — raw inner voice) ──
    Best for: quiet victories, self-discovery, personal turning points
    "The Chai" — Choosing herself

    Scene 1 [zoom_in]:
      "I cancelled the plan. I didn't explain."
      "I made chai. Sat with the silence."
      IMAGE: Close-up of hands around a chai cup, soft indoor light, evening

    Scene 2 [pan_left]:
      "The guilt lasted about ten minutes."
      "The quiet lasted all night. It was enough."
      IMAGE: Medium shot of her on a couch, city lights through window, blue hour

    Scene 3 [zoom_out]:
      "I used to call that selfish. I call it something else now."
      IMAGE: Wide shot of her in the room alone, small, peaceful

    ── STORY RULES (apply to all POVs) ──
    - Choose POV based on story type: 3rd for observation, 2nd for confrontation, 1st for confession
    - Stay in ONE POV throughout the entire story — do not mix
    - End with a small, specific moment the character lives — not a productivity CTA for the viewer
      GOOD: "She opened a new doc. Typed her name at the top. Started."
      BAD: "Update your LinkedIn today" or "Follow for more tips"
    - No stats, no percentages, no research data — emotional truth is the data
    - 8-12 words per line. Show the moment, never explain the feeling.
    - Visual anchor: one recurring element (a notebook, a chai cup, a window) across all scenes

