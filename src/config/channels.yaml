# =============================================================================
# CHANNEL CONFIGURATIONS
# =============================================================================
# Topic curation principles:
#   - No duplicates or near-duplicates
#   - No ambiguous or interchangeable topics
#   - India-relevant where the channel audience is Indian
#   - Specific enough that two posts cannot be confused
#   - Western concepts replaced with Indian equivalents where appropriate
# =============================================================================


pagecapsules:
  name: "PageCapsules"
  theme: "Turning powerful book ideas into simple visual insights"
  target_audience: "Ambitious professionals, entrepreneurs, and lifelong learners (22-40)"
  posting_schedule: "1-2x daily"
  tone: "engaging, insightful, actionable, inspiring"
  localization_type: "global"
  voice_id: "en-IN-NeerjaExpressiveNeural"

  style_guidelines: >
    Clear and concise text overlays with minimal modern design.
    Every post should feel like the one idea from the book
    the reader will repeat to someone tomorrow.

  strategist_persona: >
    You are the Lead Book Strategist for PageCapsules.
    Your goal: find the ONE idea in this book that will make
    someone stop scrolling and think I needed to hear that today.
    Not a summary. A realization.

  content_team_persona: >
    You are the PageCapsules content team executing the strategy brief below.
    Tone: engaging, insightful, actionable.
    Audience: ambitious professionals and lifelong learners (22-40).

  strategic_core: |
    ### STRATEGIC CORE:
    - **One Idea Per Post:** Find the single most counter-intuitive idea
      in the book. Build everything around that.
    - **No Summaries:** Never write "Here are 5 lessons from X."
      Write the insight itself.
    - **Practical First:** Every slide must answer "so what do I do with this?"
    - **Human Entry Point:** Start with a situation the reader has lived,
      then introduce the book insight as the explanation.

  copy_voice_examples: |
    ### COPY VOICE:
    WRONG: "Atomic Habits teaches you to build good habits and break bad ones."
    RIGHT: "You do not rise to the level of your goals. You fall to the level of your systems."

    WRONG: "James Clear explains why small changes matter."
    RIGHT: "A 1% improvement every day makes you 37x better by year end. A 1% decline makes you nearly zero."

    The test: would a reader screenshot this to send to a friend?

  curated_topics:
    # Self-improvement
    - "Atomic Habits by James Clear"
    - "Deep Work by Cal Newport"
    - "Mindset by Carol Dweck"
    - "The Power of Habit by Charles Duhigg"
    - "Can't Hurt Me by David Goggins"
    - "The 5 AM Club by Robin Sharma"
    - "Grit by Angela Duckworth"
    - "Man's Search for Meaning by Viktor Frankl"
    # Psychology & Thinking
    - "Thinking, Fast and Slow by Daniel Kahneman"
    - "Influence by Robert Cialdini"
    - "Predictably Irrational by Dan Ariely"
    - "The Happiness Hypothesis by Jonathan Haidt"
    - "Stumbling on Happiness by Daniel Gilbert"
    - "Blink by Malcolm Gladwell"
    - "The Paradox of Choice by Barry Schwartz"
    - "The Art of Thinking Clearly by Rolf Dobelli"
    # Business & Money
    - "The Psychology of Money by Morgan Housel"
    - "Zero to One by Peter Thiel"
    - "The Lean Startup by Eric Ries"
    - "The Hard Thing About Hard Things by Ben Horowitz"
    - "Good to Great by Jim Collins"
    - "Rework by Jason Fried"
    - "The Almanack of Naval Ravikant"
    - "Poor Charlie's Almanack by Charlie Munger"
    # Productivity
    - "Getting Things Done by David Allen"
    - "Essentialism by Greg McKeown"
    - "Make Time by Jake Knapp and John Zeratsky"
    - "Indistractable by Nir Eyal"
    - "Flow by Mihaly Csikszentmihalyi"
    - "The One Thing by Gary Keller"
    # Leadership & Relationships
    - "How to Win Friends and Influence People by Dale Carnegie"
    - "Dare to Lead by Brene Brown"
    - "Radical Candor by Kim Scott"
    - "Never Split the Difference by Chris Voss"
    - "The Culture Code by Daniel Coyle"
    # Big Ideas
    - "Sapiens by Yuval Noah Harari"
    - "The Black Swan by Nassim Taleb"
    - "Antifragile by Nassim Taleb"
    - "Thinking in Systems by Donella Meadows"

  allow_ai_discovery: true
  visual_preferences:
    - "Minimal backgrounds"
    - "Bold readable typography"
    - "High contrast colors"
    - "Clean carousel layouts"
    - "Subtle references to book covers"


