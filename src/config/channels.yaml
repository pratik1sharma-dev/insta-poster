wealthcapsules:
  name: "WealthCapsules"
  theme: "Clear and practical insights about money, investing, and wealth building"
  target_audience: "Young Indian professionals (22-40), first-generation investors, and people pursuing financial independence"
  cultural_context: >
    Audience is primarily Indian. Use Indian financial context naturally
    -- SIP, PPF, FD, EPF, Nifty, ELSS -- where relevant.
    Write like a smart friend in a WhatsApp voice note, not a Western finance blog.
    Never use Hinglish artificially.
  posting_schedule: "1-2x daily"
  tone: "practical, insightful, empowering"
  localization_type: "india"
  voice_id: "en-IN-PrabhatNeural"

  style_guidelines: >
    Minimal modern design with clear actionable financial insights.
    Every post should make the reader feel capable of taking one
    concrete step today -- not overwhelmed.

  strategist_persona: >
    You are the Lead Financial Strategist for WealthCapsules.
    Your goal: find the Human Stake in every money topic.
    Why does this principle matter to a 28-year-old in Bangalore
    who just got their first salary and has no idea what to do with it?

  content_team_persona: >
    You are the WealthCapsules content team executing the strategy brief below.
    Tone: practical, empowering, like a knowledgeable friend.
    Audience: young Indian professionals building wealth for the first time.

  strategic_core: |
    ### STRATEGIC CORE:
    - **No Jargon Gates:** Never open with a technical term. Open with a situation.
    - **Indian Context First:** Use SIP, FD, Nifty, EPF, PPF, ELSS where natural.
    - **First-Generation Lens:** Most readers build wealth without a blueprint.
      Every post should feel like advice their parents could not give them.
    - **One Action:** End every post with one thing the reader can do today.
    - **Analytical Integrity:** Never invent returns, tax rates, or market figures.

    ### INDIAN AUDIENCE LENS:
    - Use INR and Crore/Lakh for all figures.
    - The reader likely has family pressure to buy property early,
      fear of anything labeled risky, and no inherited wealth blueprint.
      Angles touching these resonate without needing to name them directly.

  copy_voice_examples: |
    ### COPY VOICE:
    WRONG: "Optimize your portfolio for maximum risk-adjusted returns."
    RIGHT: "Your parents kept everything in FDs. Here is what that actually cost them over 20 years."

    WRONG: "Compound interest grows wealth exponentially."
    RIGHT: "Rs 5,000 a month in SIP at age 25. Rs 2.3 crore at age 60.
            The same amount starting at 35? Rs 67 lakh. That gap is just 10 years."

    The test: would a 26-year-old share this in a salary WhatsApp group?

  curated_topics:
    # Compounding and Time
    - "How compounding actually works with real SIP examples from age 22 to 60"
    - "Why starting a SIP at 22 beats starting at 32 -- the actual numbers"
    - "The real cost of delaying your first investment by 5 years"
    - "How small monthly SIPs grow into crores over 30 years"
    - "Time in market vs timing the market -- what Indian data shows"
    # Indian Investment Instruments
    - "SIP vs lump sum investing -- which works better and when"
    - "PPF vs ELSS -- which tax-saving instrument wins long term"
    - "FD vs debt mutual funds -- what your bank does not tell you"
    - "EPF -- why most Indians underuse their best guaranteed return"
    - "NPS explained -- who should use it and who should not"
    - "Index funds in India -- Nifty 50 vs Nifty Next 50 vs Nifty 500"
    - "Direct vs regular mutual funds -- the hidden fee that costs lakhs"
    - "How to build a simple portfolio using only index funds"
    - "Liquid funds vs savings account -- where to keep your emergency money"
    # Wealth Building Fundamentals
    - "The 50/30/20 rule adapted for Indian salaries and expenses"
    - "Emergency fund -- how much to keep and exactly where in India"
    - "Asset allocation by age -- a simple Indian framework"
    - "Portfolio rebalancing -- when and how without panic selling"
    - "How inflation erodes FD returns -- the real purchasing power loss"
    - "Renting vs buying a home in India -- the honest financial math"
    - "The real cost of a home loan EMI over 20 years"
    # Behavioral Finance
    - "Why Indian investors panic sell during market crashes"
    - "The psychology behind chasing hot stock tips"
    - "Lifestyle inflation -- why salary hikes do not automatically build wealth"
    - "Spending psychology -- why UPI makes us spend more than cash"
    - "Loss aversion -- why Indian investors hold losing stocks too long"
    - "How social comparison drives bad financial decisions"
    - "The sunk cost trap -- when to exit a bad investment"
    # Tax and Practical Planning
    - "LTCG vs STCG -- how taxes reduce your actual stock market returns"
    - "Tax loss harvesting -- the legal way to reduce capital gains tax"
    - "Section 80C -- how to use it smartly beyond just EPF"
    - "Health insurance -- why it is the most important financial product"
    - "Term insurance -- how much cover you actually need and why"
    - "How to read a mutual fund factsheet before investing"
    # Financial Independence
    - "What financial independence actually means on an Indian salary"
    - "How to calculate your FIRE number in rupees"
    - "Passive income in India -- what actually works vs what just sounds good"
    - "How to pay off a personal loan faster without stopping investments"
    - "The opportunity cost of buying a car on EMI"
    - "Generational wealth -- why most Indian families reset to zero each generation"
    - "How to talk about money with your parents and partner"

  allow_ai_discovery: true
  visual_preferences:
    - "Minimal backgrounds"
    - "Bold readable typography"
    - "High contrast colors"
    - "Clean carousel layouts"
    - "Subtle finance icons"


