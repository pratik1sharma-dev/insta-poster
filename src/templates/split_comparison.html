<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            width: 1080px; height: 1080px; margin: 0; display: flex; justify-content: center; align-items: center;
            font-family: 'Montserrat', "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif;
            background-color: {{ bg_color }}; color: {{ text_color }};
            position: relative; overflow: hidden;
        }
        /* Grainy Texture Overlay */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05; contrast: 120%; brightness: 100%; pointer-events: none; z-index: 2;
        }
        .bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; background: rgba(0,0,0,0.1); 
            background-image: radial-gradient(circle, {{ text_color }} 1px, transparent 1px);
            background-size: 100px 100px;
            opacity: 0.02;
        }
        .content {
            width: 90%; height: 80%; display: flex; z-index: 3;
            justify-content: center; align-items: center; text-align: center;
        }
        #text-fit {
            width: 100%;
            font-size: 80px; font-weight: 900; line-height: 1.1;
            white-space: pre-wrap;
        }
        .brand { 
            position: absolute; top: 40px; right: 40px; 
            font-size: 22px; font-weight: 400; text-transform: uppercase; 
            z-index: 4; opacity: 0.4; letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    {% if bg_style == 'blurred_hook' %}<img src="{{ bg_image_b64 }}" class="bg-image">{% endif %}
    <div class="overlay"></div>
    <div class="brand">{{ channel_name }}</div>
    <div class="content">
        <div id="text-fit">{{ text_overlay }}</div>
    </div>

    <script>
        function fitText() {
            const container = document.querySelector('.content');
            const text = document.getElementById('text-fit');
            let fontSize = 80;
            
            while ((text.scrollHeight > container.offsetHeight || text.scrollWidth > container.offsetWidth) && fontSize > 20) {
                fontSize--;
                text.style.fontSize = fontSize + 'px';
            }
        }
        window.onload = fitText;
    </script>
</body>
</html>
