<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        html, body {
            width: 1080px; height: 1080px; margin: 0; padding: 0; overflow: hidden;
            background-color: {{ bg_color }};
        }
        body {
            display: flex; justify-content: center; align-items: center;
            font-family: 'Montserrat', "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif;
            color: {{ text_color }};
            position: relative;
        }
        /* Background Layer Stack */
        .bg-base {
            position: absolute; top: 0; left: 0; width: 1080px; height: 1080px;
            background-image: linear-gradient(135deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.5) 100%);
            z-index: 1;
        }
        .bg-image {
            position: absolute; top: 0; left: 0; width: 1080px; height: 1080px; object-fit: cover; z-index: 2;
        }
        .overlay { 
            position: absolute; top: 0; left: 0; width: 1080px; height: 1080px; z-index: 3; 
            background-image: radial-gradient(circle, {{ text_color }} 1px, transparent 1px);
            background-size: 100px 100px;
            opacity: 0.02;
        }
        /* Grainy Texture Overlay */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 1080px; height: 1080px;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05; pointer-events: none; z-index: 10;
        }
        /* Comparison Box */
        .content {
            width: 900px; height: 750px; display: flex; flex-direction: column; z-index: 5;
            justify-content: center; align-items: center; text-align: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 60px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        #headline {
            font-size: 80px; font-weight: 900; line-height: 1.1; margin-bottom: 30px;
            white-space: pre-wrap;
        }
        #body-text {
            font-size: 45px; font-weight: 400; line-height: 1.3; opacity: 0.9;
            white-space: pre-wrap;
        }
        .brand { 
            position: absolute; top: 60px; right: 60px; 
            font-size: 24px; font-weight: 700; text-transform: uppercase; 
            z-index: 10; opacity: 0.6; letter-spacing: 0.15em;
        }
        .handle {
            position: absolute; bottom: 60px; left: 60px;
            font-size: 24px; font-weight: 700; z-index: 10; opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="bg-base"></div>
    {% if bg_style == 'blurred_hook' and bg_image_b64 %}<img src="{{ bg_image_b64 }}" class="bg-image">{% endif %}
    <div class="overlay"></div>
    <div class="brand">{{ channel_name }}</div>
    <div class="handle">@{{ channel_name|lower|replace(' ', '') }}</div>
    <div class="content">
        {% if '---' in text_overlay %}
            {% set parts = text_overlay.split('---') %}
            <div id="headline">{{ parts[0].strip() }}</div>
            <div id="body-text">{{ parts[1].strip() }}</div>
        {% else %}
            <div id="headline" style="margin-bottom: 0;">{{ text_overlay }}</div>
        {% endif %}
    </div>

    <script>
        function fitText() {
            const container = document.querySelector('.content');
            const headline = document.getElementById('headline');
            const bodyText = document.getElementById('body-text');
            if (!headline) return;
            
            let hSize = 80;
            let bSize = 45;

            let iterations = 0;
            while (container.scrollHeight > container.offsetHeight && iterations < 100) {
                if (hSize > 35) hSize -= 2;
                if (bodyText && bSize > 25) bSize -= 1;
                
                headline.style.fontSize = hSize + 'px';
                if (bodyText) bodyText.style.fontSize = bSize + 'px';
                iterations++;
            }
        }
        window.onload = fitText;
    </script>
</body>
</html>
