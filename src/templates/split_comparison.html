<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            width: 1080px; height: 1080px; margin: 0; display: flex; justify-content: center; align-items: center;
            font-family: 'Montserrat', sans-serif; background-color: {{ bg_color }}; color: {{ text_color }};
            position: relative; overflow: hidden;
        }
        .bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; background: rgba(0,0,0,0.2); }
        .content {
            width: 100%; height: 100%; display: flex; z-index: 3;
        }
        .side {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center;
        }
        .side-title { font-size: 40px; font-weight: 400; margin-bottom: 20px; opacity: 0.8; }
        .side-value { font-size: 100px; font-weight: 900; line-height: 1.1; }
        .divider { width: 4px; height: 60%; background: {{ text_color }}; align-self: center; opacity: 0.3; }
        .brand { position: absolute; top: 60px; font-size: 28px; font-weight: 700; text-transform: uppercase; z-index: 4; opacity: 0.8; left: 50%; transform: translateX(-50%); }
        .footer { position: absolute; bottom: 60px; font-size: 32px; font-weight: 700; z-index: 4; opacity: 0.6; left: 50%; transform: translateX(-50%); }
    </style>
</head>
<body>
    {% if bg_style == 'blurred_hook' %}<img src="{{ bg_image_b64 }}" class="bg-image">{% endif %}
    <div class="overlay"></div>
    <div class="brand">{{ channel_name }}</div>
    <div class="content">
        {% set parts = text_overlay.split('vs') %}
        {% if parts|length > 1 %}
            <div class="side">
                <div class="side-value">{{ parts[0].strip() }}</div>
            </div>
            <div class="divider"></div>
            <div class="side">
                <div class="side-value">{{ parts[1].strip() }}</div>
            </div>
        {% else %}
            <div class="side" style="width: 100%;">
                <div class="side-value">{{ text_overlay }}</div>
            </div>
        {% endif %}
    </div>
    <div class="footer">{{ current_slide }} / {{ total_slides }}</div>
</body>
</html>
