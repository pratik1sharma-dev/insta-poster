<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            width: 1080px; height: 1080px; margin: 0; display: flex; justify-content: center; align-items: center;
            font-family: 'Montserrat', "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif;
            background-color: {{ bg_color }};
            background-image: linear-gradient(135deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.5) 100%);
            color: {{ text_color }};
            position: relative; overflow: hidden;
        }
        /* Grainy Texture Overlay */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05; pointer-events: none; z-index: 10;
        }
        .bg-image { position: absolute; top: 0; left: 0; width: 1080px; height: 1080px; object-fit: cover; z-index: 1; }
        .overlay { 
            position: absolute; top: 0; left: 0; width: 1080px; height: 1080px; z-index: 2; 
            background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, transparent 100%);
            background-image: radial-gradient(circle, {{ text_color }} 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.04;
        }
        .content {
            width: 85%; height: 75%; text-align: center; z-index: 5;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 60px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        #text-fit {
            font-size: 70px; font-weight: 800; line-height: 1.3; margin-bottom: 60px; 
            white-space: pre-wrap;
        }
        .action-box {
            display: inline-block; padding: 30px 60px; border: 5px solid {{ text_color }};
            font-size: 40px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em;
        }
        .brand { 
            position: absolute; top: 50px; right: 50px; 
            font-size: 24px; font-weight: 700; text-transform: uppercase; 
            z-index: 10; opacity: 0.5; letter-spacing: 0.15em;
        }
        .handle {
            position: absolute; bottom: 50px; left: 50px;
            font-size: 24px; font-weight: 700; z-index: 10; opacity: 0.5;
        }
    </style>
</head>
<body>
    {% if bg_style == 'blurred_hook' and bg_image_b64 %}<img src="{{ bg_image_b64 }}" class="bg-image">{% endif %}
    <div class="overlay"></div>
    <div class="brand">{{ channel_name }}</div>
    <div class="handle">@{{ channel_name|lower }}</div>
    <div class="content">
        <div id="text-fit">{{ text_overlay }}</div>
        <div class="action-box">Save this post</div>
    </div>

    <script>
        function fitText() {
            const container = document.querySelector('.content');
            const text = document.getElementById('text-fit');
            let fontSize = 70;
            const maxWidth = container.offsetWidth - 120;
            const maxHeight = container.offsetHeight - 120;
            
            while ((text.scrollHeight > maxHeight || text.scrollWidth > maxWidth) && fontSize > 20) {
                fontSize--;
                text.style.fontSize = fontSize + 'px';
            }
        }
        window.onload = fitText;
    </script>
</body>
</html>
