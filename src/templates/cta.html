<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            width: 1080px; height: 1080px; margin: 0; display: flex; justify-content: center; align-items: center;
            font-family: 'Montserrat', sans-serif; background-color: {{ bg_color }}; color: {{ text_color }};
            position: relative; overflow: hidden;
        }
        .bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, transparent 100%); }
        .content {
            width: 85%; text-align: center; z-index: 3;
        }
        .cta-text { font-size: 70px; font-weight: 800; line-height: 1.3; margin-bottom: 60px; }
        .action-box {
            display: inline-block; padding: 30px 60px; border: 5px solid {{ text_color }};
            font-size: 40px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em;
        }
        .brand { position: absolute; top: 60px; font-size: 28px; font-weight: 700; text-transform: uppercase; z-index: 3; opacity: 0.8; }
    </style>
</head>
<body>
    {% if bg_style == 'blurred_hook' %}<img src="{{ bg_image_b64 }}" class="bg-image">{% endif %}
    <div class="overlay"></div>
    <div class="brand">{{ channel_name }}</div>
    <div class="content">
        <div class="cta-text">{{ text_overlay }}</div>
        <div class="action-box">Save this post</div>
    </div>
</body>
</html>
