<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            width: 1080px; height: 1080px; margin: 0; display: flex; justify-content: center; align-items: center;
            font-family: 'Montserrat', sans-serif; background-color: {{ bg_color }}; color: {{ text_color }};
            position: relative; overflow: hidden;
        }
        .bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
        .content {
            width: 90%; text-align: center; z-index: 3; display: flex; flex-direction: column;
        }
        .main-text { font-size: 180px; font-weight: 900; line-height: 1; text-transform: uppercase; margin-bottom: 20px; }
        .sub-text { font-size: 50px; font-weight: 400; opacity: 0.9; }
        .brand { position: absolute; top: 60px; font-size: 28px; font-weight: 700; text-transform: uppercase; z-index: 3; opacity: 0.8; }
        .footer { position: absolute; bottom: 60px; font-size: 32px; font-weight: 700; z-index: 3; opacity: 0.6; }
    </style>
</head>
<body>
    {% if bg_style == 'blurred_hook' %}<img src="{{ bg_image_b64 }}" class="bg-image">{% endif %}
    <div class="overlay"></div>
    <div class="brand">{{ channel_name }}</div>
    <div class="content">
        {% set parts = text_overlay.split(':') %}
        {% if parts|length > 1 %}
            <div class="main-text">{{ parts[0] }}</div>
            <div class="sub-text">{{ parts[1:]|join(':') }}</div>
        {% else %}
            <div class="main-text">{{ text_overlay }}</div>
        {% endif %}
    </div>
    <div class="footer">{{ current_slide }} / {{ total_slides }}</div>
</body>
</html>
