<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        html, body {
            width: 1080px; height: 1080px; margin: 0; padding: 0; overflow: hidden;
            background-color: {{ bg_color }};
        }
        body {
            display: flex; justify-content: center; align-items: center;
            font-family: 'Poppins', sans-serif;
            color: {{ text_color }};
            position: relative;
        }
        /* Background Layer Stack */
        .bg-base {
            position: absolute; top: 0; left: 0; width: 1080px; height: 1080px;
            background-image: linear-gradient(135deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.6) 100%);
            z-index: 1;
        }
        .bg-image {
            position: absolute; top: 0; left: 0; width: 1080px; height: 1080px; object-fit: cover; z-index: 2;
        }
        .overlay { 
            position: absolute; top: 0; left: 0; width: 1080px; height: 1080px; z-index: 3; 
            background-image: radial-gradient(circle, {{ text_color }} 1px, transparent 1px);
            background-size: 80px 80px;
            opacity: 0.05;
        }
        /* Grainy Texture Overlay */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 1080px; height: 1080px;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.07; pointer-events: none; z-index: 10;
        }
        
        .content {
            width: 920px;
            max-height: 800px;
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center; /* Big fact remains centered but uses new fonts */
            text-align: center;
            z-index: 5;
            position: relative;
        }
        #headline {
            font-family: 'Anton', sans-serif;
            font-size: 140px; 
            font-weight: 400; 
            line-height: 1; 
            text-transform: uppercase;
            text-shadow: 0 15px 45px rgba(0,0,0,0.6);
            white-space: pre-wrap;
        }
        .brand { 
            position: absolute; top: 60px; left: 60px; 
            font-size: 28px; font-weight: 800; text-transform: uppercase; 
            z-index: 10; opacity: 0.9; letter-spacing: 0.1em;
            display: flex; align-items: center;
        }
        .brand::before {
            content: ""; display: inline-block; width: 12px; height: 12px;
            background: {{ text_color }}; margin-right: 15px; border-radius: 2px;
        }
        .handle {
            position: absolute; bottom: 60px; right: 60px;
            font-size: 24px; font-weight: 600; z-index: 10; opacity: 0.7;
        }

        /* Slide progress bar */
        .progress-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 12px; z-index: 10; background: rgba(255,255,255,0.1);
        }
        .progress-bar {
            height: 100%; background: {{ text_color }}; width: {{ (current_slide / total_slides) * 100 }}%;
        }
    </style>
</head>
<body>
    <div class="bg-base"></div>
    {% if bg_style == 'blurred_hook' and bg_image_b64 %}<img src="{{ bg_image_b64 }}" class="bg-image">{% endif %}
    <div class="overlay"></div>
    <div class="brand">{{ channel_name }}</div>
    <div class="handle">@{{ channel_name|lower|replace(' ', '') }}</div>
    <div class="content">
        <div id="headline">{{ text_overlay }}</div>
    </div>

    <div class="progress-container"><div class="progress-bar"></div></div>

    <script>
        function fitText() {
            const container = document.querySelector('.content');
            const headline = document.getElementById('headline');
            if (!headline) return;
            
            let hSize = 140;
            let iterations = 0;
            while (container.scrollHeight > container.offsetHeight && iterations < 100) {
                hSize -= 5;
                headline.style.fontSize = hSize + 'px';
                iterations++;
            }
        }
        window.onload = fitText;
    </script>
</body>
</html>
